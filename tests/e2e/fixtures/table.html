<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E2E Test - Table</title>
  <style>
    table { border-collapse: collapse; width: 100%; max-width: 600px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f5f5f5; }
  </style>
</head>
<body>
  <h1>Table Test</h1>
  <table id="data-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>Alice Johnson</td>
        <td>alice@example.com</td>
        <td>Active</td>
      </tr>
      <tr>
        <td>2</td>
        <td>Bob Smith</td>
        <td>bob@example.com</td>
        <td>Inactive</td>
      </tr>
      <tr>
        <td>3</td>
        <td>Carol White</td>
        <td>carol@example.com</td>
        <td>Active</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
