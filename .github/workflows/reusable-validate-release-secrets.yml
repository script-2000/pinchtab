name: Reusable / Validate Release Secrets

on:
  workflow_call:
    secrets:
      HOMEBREW_TAP_GITHUB_TOKEN:
        required: true
      NPM_TOKEN:
        required: true
      DOCKERHUB_USER:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      CLAWHUB_TOKEN:
        required: true
  workflow_dispatch:

permissions:
  contents: read

jobs:
  homebrew-token:
    name: Validate Homebrew Tap Token
    runs-on: ubuntu-latest
    steps:
      - name: Check secret presence
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN is not set" >&2
            exit 1
          fi

      - name: Verify tap repository access
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          git ls-remote "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/pinchtab/homebrew-tap.git" HEAD >/dev/null

  npm-token:
    name: Validate npm Token
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Check secret presence
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN is not set" >&2
            exit 1
          fi

      - name: Verify npm authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami

  dockerhub-token:
    name: Validate DockerHub Credentials
    runs-on: ubuntu-latest
    steps:
      - name: Check secret presence
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USER" ]; then
            echo "DOCKERHUB_USER is not set" >&2
            exit 1
          fi
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "DOCKERHUB_TOKEN is not set" >&2
            exit 1
          fi

      - name: Verify DockerHub authentication
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USER" --password-stdin

  clawhub-token:
    name: Validate ClawHub Token
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Check secret presence
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "CLAWHUB_TOKEN is not set" >&2
            exit 1
          fi

      - name: Install ClawHub CLI
        run: npm i -g clawhub

      - name: Verify ClawHub authentication
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: clawhub login --token "$CLAWHUB_TOKEN" --no-browser

  summary:
    name: Summarize Release Secret Checks
    needs:
      - homebrew-token
      - npm-token
      - dockerhub-token
      - clawhub-token
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        run: |
          echo "## Release Secret Checks" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Credential | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Homebrew Tap | ${{ needs.homebrew-token.result == 'success' && '✅ success' || format('❌ {0}', needs.homebrew-token.result) }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| npm | ${{ needs.npm-token.result == 'success' && '✅ success' || format('❌ {0}', needs.npm-token.result) }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| DockerHub | ${{ needs.dockerhub-token.result == 'success' && '✅ success' || format('❌ {0}', needs.dockerhub-token.result) }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ClawHub | ${{ needs.clawhub-token.result == 'success' && '✅ success' || format('❌ {0}', needs.clawhub-token.result) }} |" >> "$GITHUB_STEP_SUMMARY"
