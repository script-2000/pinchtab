name: Reusable / Release Publish

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to publish from (for example refs/tags/v0.8.0)'
        required: true
        type: string
      tag:
        description: 'Release tag with v prefix'
        required: true
        type: string

env:
  GORELEASER_VERSION: v2.14.3

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    name: Release Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: bun install --frozen-lockfile

      - name: Run GoReleaser
        run: |
          curl -sfL https://goreleaser.com/static/run | VERSION="$GORELEASER_VERSION" bash -s -- release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version
        id: version
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update npm package version
        working-directory: npm
        run: |
          CURRENT=$(jq -r .version package.json)
          DESIRED=${{ steps.version.outputs.version }}
          if [ "$CURRENT" != "$DESIRED" ]; then
            npm version "$DESIRED" --no-git-tag-version
          else
            echo "Version already correct: $CURRENT"
          fi

      - name: Install dependencies
        working-directory: npm
        run: npm ci --ignore-scripts

      - name: Build TypeScript
        working-directory: npm
        run: npm run build

      - name: Publish to npm
        working-directory: npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs:
      - release
      - npm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Extract Docker metadata
        id: meta
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          labels: |
            org.opencontainers.image.source=https://github.com/pinchtab/pinchtab
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          tags: |
            ghcr.io/pinchtab/pinchtab:latest
            ghcr.io/pinchtab/pinchtab:${{ steps.meta.outputs.tag }}
            ghcr.io/pinchtab/pinchtab:${{ steps.meta.outputs.version }}
            pinchtab/pinchtab:latest
            pinchtab/pinchtab:${{ steps.meta.outputs.tag }}
            pinchtab/pinchtab:${{ steps.meta.outputs.version }}

  skill:
    name: Publish Skill
    needs:
      - release
      - npm
    uses: ./.github/workflows/reusable-publish-skill.yml
    with:
      version: ${{ inputs.tag }}
    secrets:
      CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
